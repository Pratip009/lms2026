<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary SEO -->
    <title>LMS — Online Learning Platform | Professional Courses & Training</title>

    <meta
      name="description"
      content="Join our online learning platform to access professional courses, healthcare training, medical assistant programs, and many other career-focused courses with video lessons and exams."
    />

    <meta
      name="keywords"
      content="LMS, online learning platform, professional courses, medical assistant course, healthcare training, online certification courses, skill development"
    />

    <meta name="author" content="LMS Platform" />
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#2563eb" />

    <!-- Canonical -->
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="LMS — Online Learning Platform" />

      property="og:description"
      content="Access professional courses including healthcare training, medical assistant programs, and many other career-focused learning paths."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />

    <!-- Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:description"
      content="Professional online courses with video lessons, exams, and certification."
    />
    <meta name="twitter:image" content="https://yourdomain.com/preview.png" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
